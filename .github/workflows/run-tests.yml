name: unit tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Test Run (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . --group dev
      - name: Setup django
        run: |
          cp ci/testsettings.py .
          python -c "from django.core.management.utils import get_random_secret_key; print('SECRET_KEY = \'%s\'' % get_secret_key())" >> testsettings.py
      - name: Run pytest
        run: pytest --cov=loc_authorities --cov-report=xml
      - name: Upload test coverage to Codecov
        uses: codecov/codecov-action@v3
          
